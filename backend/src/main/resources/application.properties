spring.application.name=job-tracker

# --- Database ---
# Update these to match your local Postgres setup, or use env vars in production.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/job_tracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345678}

# --- JPA ---
# update: safe for local dev, auto-creates/updates tables from your entities.
# Switch to 'validate' once you add Flyway/Liquibase migrations (Week 4).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Server ---
server.port=8080

jwt.secret=1anucha_super_secret_key_for_job_tracker_2026_secure_123456789
jwt.expiration=3600000
