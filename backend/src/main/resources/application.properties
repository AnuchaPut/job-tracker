spring.application.name=job-tracker

# --- Database ---
# Update these to match your local Postgres setup, or use env vars in production.
spring.datasource.url=jdbc:postgresql://localhost:5432/job_tracker
spring.datasource.username=postgres
spring.datasource.password=12345678

# --- JPA ---
# update: safe for local dev, auto-creates/updates tables from your entities.
# Switch to 'validate' once you add Flyway/Liquibase migrations (Week 4).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Server ---
server.port=8080
